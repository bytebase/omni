name: Container Tests

on:
  schedule:
    # Run daily at 08:00 UTC (17:00 JST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  pg-container-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Container tests (PG catalog)
        run: go test -timeout 15m ./pg/catalog/ -run TestContainer -count=1 -v

  mysql-container-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25']
        shard:
          - name: smoke-and-misc
            run: '^(TestDDLWorkflow_Container|TestShowCreateTable_ContainerComparison|TestContainerSmoke|TestContainer_ReservedKeywordAcceptance|TestSpotCheck_CatalogVerification|TestMySQL_DeparseRules)$'
          - name: section-1-core
            run: '^TestContainer_Section_1_([1-9]|10|11|12)_'
          - name: section-1-indexes-options
            run: '^TestContainer_Section_1_(13|14|15|16|17|18|19|20)_'
          - name: section-2-ddl
            run: '^TestContainer_Section_2_'
          - name: sections-3-through-6
            run: '^TestContainer_Section_[3-6]_'
          - name: deparse-container
            run: '^(TestDeparse_.*_Container|TestDeparseContainer_)'
          - name: implicit-scenarios-c
            run: '^TestScenario_C'
          - name: implicit-scenarios-extra
            run: '^TestScenario_(AX|PS)$'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Container tests (MySQL catalog / ${{ matrix.shard.name }})
        run: go test -timeout 15m ./mysql/catalog/ -run '${{ matrix.shard.run }}' -count=1 -v

  paren-fuzz-nightly:
    # SCENARIOS-pg-paren-dispatch.md §5.2 — wide-N nightly fuzz run.
    # N=10000 catches low-frequency paren-dispatch drift that the
    # PR-gate N=1000 misses. Still uses PAREN_FUZZ_DEFER so a single
    # fresh mismatch doesn't auto-fail the nightly build; the
    # timestamped artefact under testdata/paren-fuzz-defer/ is the
    # triage signal.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        go-version: ['1.25']
    env:
      PAREN_FUZZ_SIZE: '10000'
      PAREN_FUZZ_DEFER: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Paren fuzz nightly (N=10000, defer mode)
        run: go test -tags=oracle -timeout 55m -run TestParenOracleFuzz ./pg/parser/... -count=1 -v

      - name: Upload deferred-mismatch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paren-fuzz-defer-nightly
          path: pg/parser/testdata/paren-fuzz-defer/*.txt
          if-no-files-found: ignore
