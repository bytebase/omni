- description: package spec
  input: |-
    CREATE PACKAGE pkg IS
      PROCEDURE p;
      FUNCTION f RETURN NUMBER;
    END pkg;
    /
  statements:
    - text: |-
        CREATE PACKAGE pkg IS
          PROCEDURE p;
          FUNCTION f RETURN NUMBER;
        END pkg;
- description: package body with nested procedure and function
  input: |-
    CREATE PACKAGE BODY pkg IS
      PROCEDURE p IS
      BEGIN
        NULL;
      END;
      FUNCTION f RETURN NUMBER IS
      BEGIN
        RETURN 1;
      END;
    END pkg;
    /
  statements:
    - text: |-
        CREATE PACKAGE BODY pkg IS
          PROCEDURE p IS
          BEGIN
            NULL;
          END;
          FUNCTION f RETURN NUMBER IS
          BEGIN
            RETURN 1;
          END;
        END pkg;
- description: simple trigger
  input: |-
    CREATE TRIGGER trg BEFORE INSERT ON t
    BEGIN
      NULL;
    END;
    /
    SELECT 1 FROM dual;
  statements:
    - text: |-
        CREATE TRIGGER trg BEFORE INSERT ON t
        BEGIN
          NULL;
        END;
    - text: "\nSELECT 1 FROM dual"
- description: compound trigger
  input: |-
    CREATE TRIGGER trg
    FOR INSERT ON t
    COMPOUND TRIGGER
      BEFORE EACH ROW IS
      BEGIN
        NULL;
      END BEFORE EACH ROW;
    END trg;
    /
  statements:
    - text: |-
        CREATE TRIGGER trg
        FOR INSERT ON t
        COMPOUND TRIGGER
          BEFORE EACH ROW IS
          BEGIN
            NULL;
          END BEFORE EACH ROW;
        END trg;
- description: type body member function
