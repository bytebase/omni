- description: anonymous begin end block
  input: "BEGIN NULL; END;\n/\nSELECT 1 FROM dual;"
  parse: true
  statements:
    - text: "BEGIN NULL; END;"
    - text: "\nSELECT 1 FROM dual"
- description: declare block
  input: |-
    DECLARE
      v NUMBER := 1;
    BEGIN
      NULL;
    END;
    /
  statements:
    - text: |-
        DECLARE
          v NUMBER := 1;
        BEGIN
          NULL;
        END;
- description: labeled block
  input: |-
    <<outer>>
    BEGIN
      NULL;
    END outer;
    /
  statements:
    - text: |-
        <<outer>>
        BEGIN
          NULL;
        END outer;
- description: nested anonymous block
  input: |-
    BEGIN
      BEGIN
        NULL;
      END;
      NULL;
    END;
    /
  statements:
    - text: |-
        BEGIN
          BEGIN
            NULL;
          END;
          NULL;
        END;
- description: exception block
  input: |-
    BEGIN
      NULL;
    EXCEPTION
      WHEN OTHERS THEN
        NULL;
    END;
    /
  statements:
    - text: |-
        BEGIN
          NULL;
        EXCEPTION
          WHEN OTHERS THEN
            NULL;
        END;
